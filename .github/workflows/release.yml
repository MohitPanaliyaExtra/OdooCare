name: Release — Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        type: string

jobs:
  build-windows:
    name: Windows (MSI + NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        run: npm ci
        working-directory: src

      - name: Install Tauri CLI
        run: npm install -D @tauri-apps/cli

      - name: Build
        run: npx tauri build
        working-directory: src-tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  create-release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: OdooCARE ${{ github.event.inputs.release_tag || github.ref_name }}
          body: |
            ## OdooCARE v${{ github.event.inputs.release_tag || github.ref_name }}

            Odoo 17 CE Module Dependency Analyzer

            ### Downloads
            | File | Description |
            |---|---|
            | `.msi` | Windows Installer (enterprise) |
            | `.exe` | NSIS installer (recommended) |

            ### Features
            - Parse `__manifest__.py` from Odoo module ZIP files
            - Resolve full dependency graph with priority-based activation order
            - Detect missing Odoo CE modules
            - Scan Python imports against Odoo 17 requirements.txt
            - Export markdown dependency reports
          files: release-files/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
